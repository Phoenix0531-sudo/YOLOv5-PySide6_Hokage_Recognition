x-build-args: &build-args
  PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim-bookworm}
  DEBIAN_MIRROR: ${DEBIAN_MIRROR:-}
  DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-}

services:
  test:
    build:
      context: .
      target: test
      args: *build-args
    image: hokage-vision-agent:dev
    command: pytest tests/unit tests/integration
    volumes:
      - .:/workspace
    environment:
      HOKAGE_VISION_BACKEND: mock
      PYTHONPATH: /workspace/src
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      QT_QPA_PLATFORM: offscreen

  gui-test:
    build:
      context: .
      target: gui-test
      args: *build-args
    image: hokage-vision-agent:gui
    command: pytest tests/gui
    volumes:
      - .:/workspace
    environment:
      HOKAGE_VISION_BACKEND: mock
      PYTHONPATH: /workspace/src
      QT_QPA_PLATFORM: offscreen
      QT_API: pyside6

  api:
    build:
      context: .
      target: test
      args: *build-args
    image: hokage-vision-agent:dev
    command: sh -lc "python -m pip install -e '.[api]' && hokage-vision --help"
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    environment:
      HOKAGE_VISION_BACKEND: mock
      PYTHONPATH: /workspace/src

  package:
    build:
      context: .
      target: test
      args: *build-args
    image: hokage-vision-agent:dev
    command: sh -lc "python -m pip install -e '.[package]' && python -m build"
    volumes:
      - .:/workspace

  desktop-build:
    build:
      context: .
      target: gui-test
      args: *build-args
    image: hokage-vision-agent:gui
    command: sh -lc "python -m pip install -e '.[desktop-build]' && python scripts/build_desktop.py"
    volumes:
      - .:/workspace
    environment:
      QT_QPA_PLATFORM: offscreen

  docs:
    build:
      context: .
      target: test
      args: *build-args
    image: hokage-vision-agent:dev
    command: sh -lc "python -m pip install -e '.[docs]' && mkdocs build"
    volumes:
      - .:/workspace
